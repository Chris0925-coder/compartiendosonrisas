<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Video Player</title>

	<link rel="stylesheet" type="text/css" href="../public/css/video-player.css">

	<script type="text/javascript" src="../public/scripts/videoPlayer.js" defer></script>

</head>
<body>

	<div class="player">
	    <video id="video" src="../public/video/VID-20260412-WA0034.mp4"></video>
	    <div class="controls">
	        <button id="playPause">▶️</button>
	        <input type="range" id="progress" value="0" min="0" max="100">
	        <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
	    </div>
	</div>

</body>
</html>
